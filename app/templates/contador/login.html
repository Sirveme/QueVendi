<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portal Contadores · QueVendi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-secondary: #64748b;
    --accent: #3b82f6;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: linear-gradient(180deg, #f1f5f9 0%, #f8fafc 100%);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .login-card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .brand-logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    color: white; display: grid; place-items: center;
    font-weight: 700;
  }
  .brand-name { font-weight: 700; font-size: 18px; }
  .subtitle {
    color: var(--text-secondary);
    font-size: 14px;
    margin: 0 0 24px 0;
  }
  h1 { font-size: 22px; margin: 12px 0 4px 0; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
  input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: 0;
    padding: 12px 16px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    margin-top: 18px;
  }
  .btn:hover { background: #2563eb; }
  .alt {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .alt a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .error {
    margin-top: 10px;
    color: var(--danger);
    font-size: 13px;
    min-height: 18px;
  }
</style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-logo">Q</div>
      <div class="brand-name">QueVendi</div>
    </div>
    <h1>Portal Contadores</h1>
    <p class="subtitle">Accede al libro de ventas de tus clientes.</p>

    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email" />

      <label for="pin">PIN</label>
      <input id="pin" name="pin" type="password" inputmode="numeric" pattern="[0-9]*" required autocomplete="current-password" />

      <div class="error" id="error"></div>
      <button class="btn" type="submit">Iniciar sesión</button>
    </form>

    <p class="alt">¿No tienes cuenta? <a href="/contador/registro">Regístrate</a></p>
  </div>

<script>
const form = document.getElementById('loginForm');
const errEl = document.getElementById('error');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.textContent = '';
  const email = document.getElementById('email').value.trim();
  const pin = document.getElementById('pin').value.trim();
  try {
    const res = await fetch('/contador/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, pin })
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      errEl.textContent = data.detail || 'No se pudo iniciar sesión';
      return;
    }
    const data = await res.json();
    localStorage.setItem('contador_token', data.access_token);
    localStorage.setItem('contador_info', JSON.stringify(data.contador || {}));
    window.location.href = '/contador/dashboard';
  } catch (err) {
    errEl.textContent = 'Error de red. Intenta de nuevo.';
  }
});
</script>
</body>
</html>
