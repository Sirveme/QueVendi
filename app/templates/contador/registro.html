<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registro Contador · QueVendi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-secondary: #64748b;
    --accent: #3b82f6;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: linear-gradient(180deg, #f1f5f9 0%, #f8fafc 100%);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 460px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .brand-logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    color: white; display: grid; place-items: center; font-weight: 700;
  }
  .brand-name { font-weight: 700; font-size: 18px; }
  h1 { font-size: 22px; margin: 12px 0 4px 0; }
  p.subtitle { color: var(--text-secondary); font-size: 14px; margin: 0 0 18px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 6px; }
  input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: 0;
    padding: 12px 16px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    margin-top: 18px;
  }
  .btn:hover { background: #2563eb; }
  .alt { margin-top: 16px; text-align: center; font-size: 13px; color: var(--text-secondary); }
  .alt a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .error { color: var(--danger); font-size: 13px; min-height: 18px; margin-top: 8px; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-logo">Q</div>
      <div class="brand-name">QueVendi</div>
    </div>
    <h1>Crea tu cuenta de contador</h1>
    <p class="subtitle">Una vez registrado, los dueños podrán invitarte por email.</p>

    <form id="regForm">
      <div style="margin-bottom:16px">
        <label style="display:block;font-weight:600;margin-bottom:6px;color:#374151">
          DNI *
        </label>
        <input type="text" id="dni" inputmode="numeric"
               pattern="\d{8}" maxlength="8" minlength="8"
               placeholder="12345678" required
               style="width:100%;padding:10px 14px;
                      border:1px solid #d1d5db;border-radius:8px;
                      font-size:15px;outline:none;box-sizing:border-box">
      </div>

      <label for="full_name">Nombre completo</label>
      <input id="full_name" required />

      <div class="row">
        <div>
          <label for="whatsapp">WhatsApp</label>
          <input id="whatsapp" inputmode="tel" placeholder="9XX XXX XXX" />
        </div>
        <div>
          <label for="phone">Teléfono</label>
          <input id="phone" />
        </div>
      </div>

      <label for="email">Email (opcional)</label>
      <input id="email" type="email" placeholder="(opcional)" />

      <div class="row">
        <div>
          <label for="ruc">RUC</label>
          <input id="ruc" maxlength="11" />
        </div>
        <div>
          <label for="firma_contable">Colegiatura</label>
          <input id="firma_contable" placeholder="CCP-XXXXX" />
        </div>
      </div>

      <label for="pin">PIN (mínimo 4 dígitos)</label>
      <input id="pin" type="password" inputmode="numeric" pattern="[0-9]*" minlength="4" maxlength="12" required />

      <div class="error" id="error"></div>
      <button class="btn" type="submit">Crear cuenta</button>
    </form>

    <p class="alt">¿Ya tienes cuenta? <a href="/contador/login">Inicia sesión</a></p>
  </div>

<script>
const form = document.getElementById('regForm');
const errEl = document.getElementById('error');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.textContent = '';
  const dni = document.getElementById('dni').value.trim();
  if (!/^\d{8}$/.test(dni)) {
    errEl.textContent = 'DNI debe tener 8 dígitos';
    return;
  }
  const body = {
    dni,
    full_name: document.getElementById('full_name').value.trim(),
    email: document.getElementById('email').value.trim() || null,
    phone: document.getElementById('phone').value.trim() || null,
    whatsapp: document.getElementById('whatsapp').value.trim() || null,
    ruc: document.getElementById('ruc').value.trim() || null,
    firma_contable: document.getElementById('firma_contable').value.trim() || null,
    pin: document.getElementById('pin').value.trim(),
  };
  try {
    const res = await fetch('/contador/registro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      errEl.textContent = data.detail || 'No se pudo registrar';
      return;
    }
    const data = await res.json();
    localStorage.setItem('contador_token', data.access_token);
    localStorage.setItem('contador_info', JSON.stringify(data.contador || {}));
    window.location.href = '/contador/dashboard';
  } catch (err) {
    errEl.textContent = 'Error de red. Intenta de nuevo.';
  }
});
</script>
</body>
</html>
