<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — QueVendi</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111b21;
      --bg-panel: #202c33;
      --bg-chat: #0b141a;
      --bg-bubble-own: #005c4b;
      --bg-bubble-other: #202c33;
      --bg-input: #2a3942;
      --verde: #00a884;
      --text: #e9edef;
      --text-secondary: #8696a0;
      --border: #2a3942;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-chat);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: var(--bg-panel);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .back-btn {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 20px;
      line-height: 1;
    }
    .chat-avatar {
      width: 38px; height: 38px;
      background: var(--verde);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; flex-shrink: 0;
    }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-size: 15px; font-weight: 600; }
    .chat-status {
      font-size: 12px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 4px;
    }
    .online-dot {
      width: 8px; height: 8px;
      border-radius: 50%; background: var(--verde);
      display: inline-block;
    }

    .online-bar {
      background: var(--bg-panel);
      padding: 6px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .online-user {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 10px;
      color: var(--text-secondary);
      min-width: 44px;
    }
    .online-user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #2a3942;
      border: 2px solid var(--verde);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background-color: var(--bg-chat);
      background-image: none;
      position: relative;
    }
    .messages-container::-webkit-scrollbar { width: 4px; }
    .messages-container::-webkit-scrollbar-thumb {
      background: #374151; border-radius: 2px;
    }
    .messages-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 60px,
        rgba(255,255,255,0.015) 60px,
        rgba(255,255,255,0.015) 61px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Marca de agua con texto */
    .watermark {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      display: flex;
      flex-wrap: wrap;
      gap: 0;
    }
    .watermark-text {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.04);
      transform: rotate(-35deg);
      white-space: nowrap;
      line-height: 3.5;
      letter-spacing: 2px;
      user-select: none;
    }

    .msg-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      position: relative;
      z-index: 1;
    }
    .msg-wrapper.own { align-self: flex-end; align-items: flex-end; }
    .msg-wrapper.other { align-self: flex-start; align-items: flex-start; }

    .msg-sender-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--verde);
      margin-bottom: 2px;
      padding-left: 10px;
    }

    .msg-bubble {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      position: relative;
      max-width: 100%;
      word-wrap: break-word;
    }
    .msg-wrapper.own .msg-bubble {
      background: var(--bg-bubble-own);
      border-radius: 8px 0 8px 8px;
    }
    .msg-wrapper.other .msg-bubble {
      background: var(--bg-bubble-other);
      border-radius: 0 8px 8px 8px;
    }

    .msg-meta {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 4px;
    }
    .msg-check { color: var(--verde); }

    .msg-system {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 4px 12px;
      align-self: center;
      margin: 4px 0;
    }

    /* Typing indicator */
    .typing-indicator {
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-chat);
    }
    .typing-bubble {
      display: flex;
      gap: 3px;
      align-items: center;
      background: var(--bg-bubble-other);
      padding: 8px 12px;
      border-radius: 16px;
    }
    .typing-bubble span {
      width: 6px; height: 6px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: typing 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }
    .typing-name { font-size: 12px; color: var(--text-secondary); }

    .input-area {
      background: var(--bg-panel);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }
    .input-wrap {
      flex: 1;
      background: var(--bg-input);
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 8px;
    }
    .msg-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
    }
    .msg-input::placeholder { color: var(--text-secondary); }

    .btn-icon {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      border-radius: 50%;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .btn-icon:hover { color: var(--verde); }

    .btn-send {
      width: 44px; height: 44px;
      background: var(--verde);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .btn-send:hover { background: #008f72; }

    .date-separator {
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      background: rgba(0,0,0,0.4);
      border-radius: 8px;
      padding: 3px 10px;
      align-self: center;
      margin: 8px 0;
    }

    /* ========================================
       LAYOUT 2 PANELES (estilo WhatsApp Web)
       ======================================== */
    .wa-layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .wa-sidebar {
      width: 360px;
      flex-shrink: 0;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .wa-sidebar-header {
      background: #1f2c34;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .wa-sidebar-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--verde);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
      flex-shrink: 0;
    }
    .wa-sidebar-title {
      font-size: 16px;
      font-weight: 600;
    }
    .wa-back-btn {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 18px;
    }

    .wa-search {
      padding: 8px 12px;
      background: var(--bg-chat);
      flex-shrink: 0;
    }
    .wa-search input {
      width: 100%;
      background: var(--bg-panel);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }
    .wa-search input::placeholder { color: var(--text-secondary); }

    .wa-chats-list {
      flex: 1;
      overflow-y: auto;
    }
    .wa-chats-list::-webkit-scrollbar { width: 4px; }
    .wa-chats-list::-webkit-scrollbar-thumb { background: #374151; }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
      position: relative;
    }
    .chat-item:hover { background: rgba(255,255,255,0.05); }
    .chat-item.active { background: #2a3942; }

    .chat-item-avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      flex-shrink: 0;
      color: white;
    }
    .chat-item-info { flex: 1; min-width: 0; }
    .chat-item-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-item-preview {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .chat-item-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .chat-item-time {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .chat-item-badge {
      background: var(--verde);
      color: white;
      border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 11px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .online-indicator {
      position: absolute;
      bottom: 14px; left: 50px;
      width: 10px; height: 10px;
      background: var(--verde);
      border-radius: 50%;
      border: 2px solid var(--bg-panel);
    }

    .wa-chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .wa-empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      gap: 12px;
    }
    .wa-empty-icon { font-size: 64px; opacity: 0.4; }
    .wa-empty-state h3 { font-size: 20px; color: var(--text); }
    .wa-empty-state p { font-size: 14px; }

    .wa-conversation {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .mobile-back-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
    }

    @media (max-width: 768px) {
      .wa-sidebar {
        width: 100%;
        position: absolute;
        z-index: 10;
        top: 0; left: 0; right: 0; bottom: 0;
        overflow-y: auto;
      }
      .wa-sidebar.hidden { display: none; }
      .wa-chats-list {
        display: block !important;
      }
      .wa-chat-panel { width: 100%; }
      .mobile-back-btn { display: block; }
      .wa-empty-state { display: none; }
    }
  </style>
</head>
<body>
<div class="wa-layout">

  <!-- PANEL IZQUIERDO — Lista de conversaciones -->
  <div class="wa-sidebar" id="wa-sidebar">

    <div class="wa-sidebar-header">
      <div class="wa-sidebar-avatar" id="my-avatar">U</div>
      <div class="wa-sidebar-title">QueVendi Chat</div>
      <div style="flex:1"></div>
      <a href="/home" class="wa-back-btn" title="Volver">⬅️</a>
    </div>

    <div class="wa-search">
      <input type="text" placeholder="🔍 Buscar o iniciar chat..."
             id="search-contacts" oninput="filtrarContactos(this.value)">
    </div>

    <div class="wa-chats-list" id="chats-list">
      <!-- Se llena dinámicamente -->
    </div>

  </div>

  <!-- PANEL DERECHO — Conversación activa -->
  <div class="wa-chat-panel" id="wa-chat-panel">

    <div class="wa-empty-state" id="empty-state">
      <div class="wa-empty-icon">💬</div>
      <h3>QueVendi Chat</h3>
      <p>Selecciona una conversación para comenzar</p>
    </div>

    <div class="wa-conversation" id="wa-conversation" style="display:none">

      <div class="chat-header">
        <button class="mobile-back-btn" onclick="volverALista()">←</button>
        <div class="chat-avatar" id="conv-avatar">G</div>
        <div class="chat-info">
          <div class="chat-name" id="conv-name">Chat</div>
          <div class="chat-status" id="conv-status">
            <span class="online-dot"></span>
            <span id="online-count">conectando...</span>
          </div>
        </div>
      </div>

      <div class="messages-container" id="messages">
        <div class="watermark" id="watermark-bg"></div>
      </div>

      <div class="typing-indicator" id="typing-indicator" style="display:none">
        <div class="typing-bubble">
          <span></span><span></span><span></span>
        </div>
        <span class="typing-name" id="typing-name">escribiendo...</span>
      </div>

      <div class="input-area">
        <div class="input-wrap">
          <button class="btn-icon" onclick="enviarAudio()"
                  title="Audio" id="btn-audio">🎤</button>
          <input type="text" class="msg-input" id="msg-input"
                 placeholder="Escribe un mensaje..."
                 onkeydown="if(event.key==='Enter')enviarMensaje()">
          <button class="btn-icon" onclick="adjuntarImagen()"
                  title="Adjuntar">📎</button>
        </div>
        <button class="btn-send" onclick="enviarMensaje()">➤</button>
      </div>

    </div>
  </div>

</div>

<script>
// ============================================
// ESTADO GLOBAL
// ============================================
const _user = JSON.parse(localStorage.getItem('user') || '{}');
const storeId = parseInt(localStorage.getItem('store_id') || _user.store_id || '0');
const token = localStorage.getItem('token') || localStorage.getItem('access_token') || '';
const userId = parseInt(localStorage.getItem('user_id') || _user.id || '0');
const userName = localStorage.getItem('user_name') || _user.full_name || 'Usuario';
const storeName = localStorage.getItem('store_name') || _user.store_name || 'Mi Negocio';

let ws = null;
let reconnectTimer = null;
let currentReceiverId = null; // null = grupo, number = privado
let currentConvName = '';
let typingTimer = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

// Usuarios del store (se carga al conectar)
let storeUsers = [];
let onlineUsers = new Set();
let unreadCounts = {}; // { 'grupo': 3, 'user_2': 1, ... }

// ============================================
// CONTACTOS / LISTA DE CHATS
// ============================================
const COLORES = ['#25d366','#128c7e','#34b7f1','#e17055',
                 '#a29bfe','#fd79a8','#fdcb6e','#6c5ce7'];

function colorFor(id) {
  return COLORES[id % COLORES.length];
}

async function cargarContactos() {
  // Cargar usuarios del store desde la API
  try {
    const res = await fetch('/api/v1/users/store/list', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) {
      const data = await res.json();
      storeUsers = (data.usuarios || []).filter(u => u.id !== userId);
    }
  } catch(e) {
    console.warn('No se pudo cargar usuarios:', e);
  }
  renderContactos();
}

function renderContactos(filtro = '') {
  const list = document.getElementById('chats-list');
  const lower = filtro.toLowerCase();

  // Grupo del negocio siempre primero
  const grupoHTML = `
    <div class="chat-item ${currentReceiverId === null ? 'active' : ''}"
         onclick="abrirConversacion(null, '${storeName}', 'G')">
      <div class="chat-item-avatar"
           style="background:${colorFor(storeId)}">
        ${storeName.charAt(0)}
      </div>
      <div class="chat-item-info">
        <div class="chat-item-name">${storeName}</div>
        <div class="chat-item-preview">
          Chat del negocio · ${onlineUsers.size} en línea
        </div>
      </div>
      <div class="chat-item-meta">
        <span class="chat-item-time">Grupo</span>
        ${(unreadCounts['grupo'] || 0) > 0
          ? `<span class="chat-item-badge">${unreadCounts['grupo']}</span>`
          : ''}
      </div>
    </div>`;

  // Usuarios individuales
  const usuariosHTML = storeUsers
    .filter(u => !filtro || u.full_name.toLowerCase().includes(lower))
    .map(u => {
      const isOnline = onlineUsers.has(u.id);
      const badge = unreadCounts[`user_${u.id}`] || 0;
      return `
        <div class="chat-item ${currentReceiverId === u.id ? 'active' : ''}"
             onclick="abrirConversacion(${u.id}, '${u.full_name}', '${u.full_name.charAt(0)}')">
          <div style="position:relative;flex-shrink:0">
            <div class="chat-item-avatar"
                 style="background:${colorFor(u.id)}">
              ${u.full_name.charAt(0).toUpperCase()}
            </div>
            ${isOnline ? '<div class="online-indicator"></div>' : ''}
          </div>
          <div class="chat-item-info">
            <div class="chat-item-name">${u.full_name}</div>
            <div class="chat-item-preview" style="color:${isOnline ? '#25d366' : ''}">
              ${isOnline ? '● En línea' : u.role || 'Vendedor'}
            </div>
          </div>
          <div class="chat-item-meta">
            ${badge > 0
              ? `<span class="chat-item-badge">${badge}</span>`
              : ''}
          </div>
        </div>`;
    }).join('');

  // Soporte QueVendi (siempre al final)
  const soporteHTML = (!filtro || 'soporte quevendi'.includes(lower)) ? `
    <div class="chat-item" onclick="alert('Próximamente: Chat con soporte QueVendi')">
      <div class="chat-item-avatar" style="background:#667eea">🛟</div>
      <div class="chat-item-info">
        <div class="chat-item-name">Soporte QueVendi</div>
        <div class="chat-item-preview">Ayuda y asistencia técnica</div>
      </div>
    </div>` : '';

  list.innerHTML = grupoHTML + usuariosHTML + soporteHTML;
}

function filtrarContactos(valor) {
  renderContactos(valor);
}

// ============================================
// ABRIR CONVERSACIÓN
// ============================================
function abrirConversacion(receiverId, nombre, inicial) {
  currentReceiverId = receiverId;
  currentConvName = nombre;

  // Actualizar header
  document.getElementById('conv-avatar').textContent = inicial;
  document.getElementById('conv-avatar').style.background =
    receiverId ? colorFor(receiverId) : colorFor(storeId);
  document.getElementById('conv-name').textContent = nombre;

  // Mostrar panel de conversación
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('wa-conversation').style.display = 'flex';
  document.getElementById('wa-conversation').style.flexDirection = 'column';

  // En móvil: ocultar sidebar
  document.getElementById('wa-sidebar').classList.add('hidden');

  // Marcar activo en lista
  renderContactos();

  // Limpiar mensajes y reconectar si es necesario
  const messages = document.getElementById('messages');
  messages.innerHTML = '<div class="watermark" id="watermark-bg"></div>';
  generarMarcaAgua();

  // Reconectar WebSocket con nuevo contexto
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    conectar();
  } else {
    // Solicitar historial filtrado
    ws.send(JSON.stringify({
      type: 'get_history',
      receiver_id: receiverId,
      content: ''
    }));
  }

  // Limpiar badge
  const key = receiverId ? `user_${receiverId}` : 'grupo';
  unreadCounts[key] = 0;
  renderContactos();

  // Foco en input
  setTimeout(() => document.getElementById('msg-input')?.focus(), 100);
}

function volverALista() {
  // Móvil: volver a la lista
  document.getElementById('wa-sidebar').classList.remove('hidden');
  document.getElementById('wa-conversation').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
}

// ============================================
// WEBSOCKET
// ============================================
function conectar() {
  if (ws) ws.close();
  const wsHost = location.host.includes('railway')
    ? location.host
    : 'bd4pjhe6.up.railway.app';
  const proto = wsHost === location.host
    ? (location.protocol === 'https:' ? 'wss' : 'ws')
    : 'wss';
  const wsUrl = `${proto}://${wsHost}/ws/chat/${storeId}?token=${encodeURIComponent(token)}`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    document.getElementById('online-count').textContent =
      `${onlineUsers.size} en línea`;
    clearTimeout(reconnectTimer);
    marcarTodoLeido();
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    procesarMensaje(data);
  };

  ws.onclose = (event) => {
    if (event.code === 4001 || event.code === 4003) {
      // 4001 = token inválido/expirado, 4003 = store no autorizado
      ['token','access_token','user','user_id',
       'store_id','user_name','store_name']
        .forEach(k => localStorage.removeItem(k));
      window.location.href = '/auth/login';
      return;
    }
    reconnectTimer = setTimeout(() => {
      const el = document.getElementById('online-count');
      if (el) el.textContent = 'reconectando...';
      conectar();
    }, 1500);
  };
  ws.onerror = () => ws.close();
}

async function marcarTodoLeido() {
  try {
    await fetch('/api/v1/chat/mark-all-read', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` }
    });
  } catch(e) {}
}

// ============================================
// PROCESAR MENSAJES
// ============================================
function procesarMensaje(data) {
  const container = document.getElementById('messages');

  // Keep-alive: responder ping con pong, ignorar pong entrantes
  if (data.type === 'ping') {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'pong', content: '' }));
    }
    return;
  }
  if (data.type === 'pong') return;

  if (data.type === 'history') {
    // Filtrar mensajes de la conversación activa
    container.innerHTML = '<div class="watermark" id="watermark-bg"></div>';
    generarMarcaAgua();

    data.messages.forEach(m => {
      const esRelevante = currentReceiverId === null
        ? m.receiver_id === null  // grupo
        : (m.sender_id === currentReceiverId && m.receiver_id === userId)
          || (m.sender_id === userId && m.receiver_id === currentReceiverId);

      if (esRelevante || currentReceiverId === null) {
        agregarBurbuja(m, m.sender_id === userId);
      }
    });
    container.scrollTop = container.scrollHeight;
    marcarTodoLeido();
    return;
  }

  if (data.type === 'system') {
    // Actualizar usuarios online
    if (data.online_users) {
      onlineUsers = new Set(data.online_users);
      document.getElementById('online-count').textContent =
        `${onlineUsers.size} en línea`;
      renderContactos();
    }
    // Mostrar mensaje de sistema
    if (currentReceiverId === null) {
      const div = document.createElement('div');
      div.className = 'msg-system';
      div.textContent = data.content;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
    return;
  }

  if (data.type === 'typing') {
    if (data.sender_id !== userId) {
      document.getElementById('typing-name').textContent =
        `${data.sender_name} está escribiendo...`;
      document.getElementById('typing-indicator').style.display = 'flex';
    }
    return;
  }

  if (data.type === 'stop_typing') {
    document.getElementById('typing-indicator').style.display = 'none';
    return;
  }

  if (data.type === 'message') {
    // ¿Es de la conversación activa?
    const esGrupo = data.receiver_id === null || data.receiver_id === undefined;
    const esPrivadoActivo = !esGrupo && currentReceiverId !== null &&
      (data.sender_id === currentReceiverId || data.receiver_id === userId);

    if ((currentReceiverId === null && esGrupo) || esPrivadoActivo || data.own) {
      agregarBurbuja(data, data.own === true);
      container.scrollTop = container.scrollHeight;
    } else if (!data.own) {
      // Notificación de mensaje en otra conversación
      const key = data.receiver_id === null ? 'grupo' : `user_${data.sender_id}`;
      unreadCounts[key] = (unreadCounts[key] || 0) + 1;
      renderContactos();
    }

    // Sonido
    if (!data.own) {
      try {
        new Audio('/static/sounds/new-notification-sound.mp3').play();
      } catch(e) {}
    }
  }
}

// ============================================
// BURBUJAS DE MENSAJE
// ============================================
function agregarBurbuja(msg, esPropio) {
  const container = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = `msg-wrapper ${esPropio ? 'own' : 'other'}`;
  wrapper.style.position = 'relative';
  wrapper.style.zIndex = '1';

  const ts = msg.timestamp
    ? (msg.timestamp.match(/[Z+\-]\d|Z$/)
       ? msg.timestamp
       : msg.timestamp + 'Z')
    : new Date().toISOString();

  const hora = new Date(ts).toLocaleTimeString('es-PE', {
    hour: '2-digit', minute: '2-digit'
  });

  const senderName = !esPropio
    ? `<div class="msg-sender-name" style="color:${colorFor(msg.sender_id || 0)}">
         ${msg.sender_name || 'Usuario'}
       </div>`
    : '';

  let contenido = '';
  if (msg.msg_type === 'text' || !msg.msg_type) {
    contenido = `<div class="msg-bubble">${escapeHtml(msg.content || '')}</div>`;
  } else if (msg.msg_type === 'image') {
    contenido = `<div class="msg-bubble" style="padding:4px">
      <img src="${msg.media_url}"
           style="max-width:220px;border-radius:8px;display:block;cursor:pointer"
           onclick="window.open('${msg.media_url}','_blank')"
           onerror="this.style.display='none'">
    </div>`;
  } else if (msg.msg_type === 'audio') {
    contenido = `<div class="msg-bubble">
      <audio controls src="${msg.media_url}"
             style="max-width:220px;height:36px"></audio>
    </div>`;
  } else if (msg.msg_type === 'video') {
    contenido = `<div class="msg-bubble" style="padding:4px">
      <video controls src="${msg.media_url}"
             style="max-width:220px;border-radius:8px;display:block"
             preload="metadata"></video>
    </div>`;
  }

  const checks = esPropio
    ? `<span class="msg-check">${msg.is_read ? '✓✓' : '✓'}</span>`
    : '';

  wrapper.innerHTML = `
    ${senderName}
    ${contenido}
    <div class="msg-meta">${hora} ${checks}</div>
  `;

  container.appendChild(wrapper);
}

// ============================================
// ENVIAR MENSAJES
// ============================================
function enviarMensaje() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;

  ws.send(JSON.stringify({
    type: 'text',
    content: content,
    receiver_id: currentReceiverId
  }));

  input.value = '';
  clearTimeout(typingTimer);
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'stop_typing', content: '' }));
  }
}

// Typing
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('msg-input')?.addEventListener('input', () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'typing', content: '' }));
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'stop_typing', content: '' }));
        }
      }, 2000);
    }
  });
});

// ============================================
// ADJUNTAR IMAGEN/VIDEO
// ============================================
async function adjuntarImagen() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*,video/*';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const maxSize = file.type.startsWith('video')
      ? 10 * 1024 * 1024 : 5 * 1024 * 1024;
    if (file.size > maxSize) {
      alert('Archivo muy grande. Máx: imágenes 5MB, videos 10MB');
      return;
    }

    const msgType = file.type.startsWith('video') ? 'video' : 'image';

    // Indicador de carga
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'msg-wrapper own';
    loadingDiv.id = 'upload-loading';
    loadingDiv.style.zIndex = '1';
    loadingDiv.innerHTML = '<div class="msg-bubble" style="color:#8696a0;font-size:12px">⏳ Enviando...</div>';
    document.getElementById('messages').appendChild(loadingDiv);
    document.getElementById('messages').scrollTop = 999999;

    const formData = new FormData();
    formData.append('file', file);
    formData.append('store_id', storeId);

    try {
      const res = await fetch('/api/v1/chat/upload-media', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      document.getElementById('upload-loading')?.remove();
      const data = await res.json();
      if (data.url && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: msgType,
          content: '',
          media_url: data.url,
          receiver_id: currentReceiverId
        }));
      }
    } catch(err) {
      document.getElementById('upload-loading')?.remove();
      console.error('Error subiendo archivo:', err);
    }
  };
  input.click();
}

// ============================================
// AUDIO
// ============================================
async function enviarAudio() {
  if (isRecording) {
    mediaRecorder?.stop();
    document.getElementById('btn-audio').textContent = '🎤';
    isRecording = false;
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, {type: 'audio/webm'});
      stream.getTracks().forEach(t => t.stop());

      const formData = new FormData();
      formData.append('file', blob, 'audio.webm');
      formData.append('store_id', storeId);

      try {
        const res = await fetch('/api/v1/chat/upload-media', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });
        const data = await res.json();
        if (data.url && ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'audio',
            content: '',
            media_url: data.url,
            receiver_id: currentReceiverId
          }));
        }
      } catch(err) {
        console.error('Error subiendo audio:', err);
      }
    };

    mediaRecorder.start();
    isRecording = true;
    document.getElementById('btn-audio').textContent = '⏹️';
  } catch(err) {
    alert('No se pudo acceder al micrófono');
  }
}

// ============================================
// MARCA DE AGUA
// ============================================
function generarMarcaAgua() {
  const wm = document.getElementById('watermark-bg');
  if (!wm) return;
  const texto = 'QueVendi  •  QV  •  quevendi.pro  ';
  let html = '';
  for (let i = 0; i < 120; i++) {
    html += `<span class="watermark-text">${texto}</span>`;
  }
  wm.innerHTML = html;
}

// ============================================
// HELPERS
// ============================================
function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================
// INICIALIZACIÓN
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  // Avatar propio
  document.getElementById('my-avatar').textContent =
    userName.charAt(0).toUpperCase();

  // Cargar contactos
  cargarContactos();

  // Conectar WebSocket (sin abrir conversación aún)
  if (storeId && token) {
    conectar();
  }

  // En desktop, abrir grupo por defecto
  if (window.innerWidth >= 769) {
    setTimeout(() => {
      abrirConversacion(null, storeName, storeName.charAt(0));
    }, 300);
  }
});
